<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공모주 계좌 캘린더 | IPO Account Calendar</title>
  <!-- Google Fonts: Noto Sans KR (Korean), Outfit (Numbers & English) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons for premium look -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <i class="fa-solid fa-calendar-check logo-icon"></i>
        <div>
          <h1>공모주 계좌 캘린더</h1>
          <p class="subtitle">영업일 20일 제한 계좌 개설 일정 관리기</p>
        </div>
      </div>
    </header>

    <!-- Top D-Day Banner -->
    <section class="banner-section" id="ddayBannerSection">
      <div class="dday-banner" id="ddayBanner">
        <div class="banner-info">
          <span class="banner-badge"><i class="fa-solid fa-bolt"></i> 개설 가능</span>
          <span class="banner-text" id="bannerText">로딩 중...</span>
        </div>
        <button class="btn btn-primary" id="btnQuickAdd">
          <i class="fa-solid fa-plus-circle"></i> 계좌 등록하기
        </button>
      </div>
    </section>

    <!-- Main Workspace Layout -->
    <main class="main-layout">
      <!-- Left Column: Calendar Card -->
      <section class="card calendar-card">
        <div class="calendar-header">
          <button class="btn-nav" id="btnPrevMonth" aria-label="이전 달">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <div class="calendar-title" id="calendarMonthTitle">2026년 06월</div>
          <button class="btn-nav" id="btnNextMonth" aria-label="다음 달">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>

        <!-- Weekdays row -->
        <div class="weekdays-grid">
          <div class="weekday sun">일</div>
          <div class="weekday">월</div>
          <div class="weekday">화</div>
          <div class="weekday">수</div>
          <div class="weekday">목</div>
          <div class="weekday">금</div>
          <div class="weekday sat">토</div>
        </div>

        <!-- Days grid -->
        <div class="days-grid" id="calendarDaysGrid">
          <!-- Rendered dynamically by JS -->
        </div>

        <!-- Calendar Legend -->
        <div class="calendar-legend">
          <div class="legend-item">
            <span class="legend-color legend-today"></span>
            <span>오늘</span>
          </div>
          <div class="legend-item">
            <span class="legend-color legend-opened"></span>
            <span>계좌 개설일</span>
          </div>
          <div class="legend-item">
            <span class="legend-color legend-dday"></span>
            <span>다음 개설 가능일 (D-Day)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color legend-holiday"></span>
            <span>공휴일 / 주말</span>
          </div>
        </div>
      </section>

      <!-- Right Column: Account Management Card -->
      <section class="card accounts-card">
        <div class="card-header">
          <div class="card-title">
            <i class="fa-solid fa-list-ul"></i>
            <h2>등록된 계좌 목록</h2>
          </div>
          <button class="btn btn-secondary btn-sm" id="btnExportCSV">
            <i class="fa-solid fa-file-csv"></i> CSV 내보내기
          </button>
        </div>

        <div class="accounts-table-container">
          <table class="accounts-table" id="accountsTable">
            <thead>
              <tr>
                <th>개설일</th>
                <th>증권사</th>
                <th>계좌종류</th>
                <th>계좌번호</th>
                <th>개설가능일 (D-Day)</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="accountsTableBody">
              <!-- Rendered dynamically by JS -->
              <tr>
                <td colspan="6" class="empty-state">등록된 계좌가 없습니다. 캘린더의 날짜를 클릭하여 추가해 보세요.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Mobile Card List View -->
        <div class="accounts-mobile-list" id="accountsMobileList">
          <!-- Rendered dynamically by JS -->
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 공모주 계좌 캘린더. All rights reserved.</p>
      <p class="notice"><i class="fa-solid fa-circle-info"></i> 매년 1월에 대한민국 공휴일 데이터가 업데이트됩니다. (소스코드 내 HOLIDAYS 설정)</p>
    </footer>
  </div>

  <!-- Account Form Modal -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">계좌 정보 입력</h3>
        <button class="btn-close" id="btnModalClose" aria-label="닫기">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <form id="accountForm">
        <input type="hidden" id="accountId">
        
        <div class="form-group">
          <label for="openedDate">계좌 개설일 <span class="required">*</span></label>
          <input type="date" id="openedDate" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="brokerSelect">증권사명 <span class="required">*</span></label>
            <select id="brokerSelect" required>
              <option value="" disabled selected>선택하세요</option>
              <option value="미래에셋증권">미래에셋증권</option>
              <option value="한국투자증권">한국투자증권</option>
              <option value="KB증권">KB증권</option>
              <option value="NH투자증권">NH투자증권</option>
              <option value="삼성증권">삼성증권</option>
              <option value="신한투자증권">신한투자증권</option>
              <option value="대신증권">대신증권</option>
              <option value="하나증권">하나증권</option>
              <option value="키움증권">키움증권</option>
              <option value="유진투자증권">유진투자증권</option>
              <option value="메리츠증권">메리츠증권</option>
              <option value="신영증권">신영증권</option>
              <option value="현대차증권">현대차증권</option>
              <option value="DB금융투자">DB금융투자</option>
              <option value="IBK투자증권">IBK투자증권</option>
              <option value="토스증권">토스증권</option>
              <option value="카카오페이증권">카카오페이증권</option>
              <option value="custom">직접 입력...</option>
            </select>
            <input type="text" id="brokerInput" class="hidden-input" placeholder="증권사명을 입력하세요">
          </div>

          <div class="form-group">
            <label for="accountTypeSelect">계좌 종류 <span class="required">*</span></label>
            <select id="accountTypeSelect" required>
              <option value="" disabled selected>선택하세요</option>
              <option value="CMA">CMA</option>
              <option value="위탁">위탁 (주식)</option>
              <option value="ISA">ISA</option>
              <option value="연금저축">연금저축</option>
              <option value="custom">직접 입력...</option>
            </select>
            <input type="text" id="accountTypeInput" class="hidden-input" placeholder="계좌 종류를 입력하세요">
          </div>
        </div>

        <div class="form-group">
          <label for="accountNumber">계좌번호</label>
          <input type="text" id="accountNumber" placeholder="계좌번호를 입력하세요 (선택)">
        </div>

        <div class="form-group">
          <label for="memo">메모</label>
          <textarea id="memo" rows="3" placeholder="청약 수수료 우대조건, 비밀번호 힌트 등을 입력해 보세요 (선택)"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="btnDeleteAccount" style="display: none;">
            <i class="fa-solid fa-trash-can"></i> 삭제
          </button>
          <div class="action-buttons">
            <button type="button" class="btn btn-secondary" id="btnModalCancel">취소</button>
            <button type="submit" class="btn btn-primary" id="btnSaveAccount">저장</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
